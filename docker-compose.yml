# Local full-stack runner. Brings up the FastAPI backend and the Next.js dev
# server, both pointed at your Supabase project via the gitignored env files.
#
#   docker compose up --build
#
# Backend  -> http://localhost:8000  (docs at /docs, health at /api/v1/health)
# Frontend -> http://localhost:3000
#
# No local Postgres here on purpose: the database is Supabase (DATABASE_URL in
# backend/.env). Run migrations with the alembic commands in DeveloperGuide.md.

services:
  backend:
    build: ./backend
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    # Keep in sync with node-version in .github/workflows/frontend-ci.yml.
    image: node:24
    working_dir: /app
    env_file:
      - frontend/.env.local
    # Install once into the named volume, then run the dev server on all
    # interfaces so it's reachable from the host.
    command: sh -c "[ -d node_modules/next ] || npm ci; npm run dev -- -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Keep node_modules and the build cache inside the container: sharing them
      # with the host mixes two Node versions' artefacts and makes Next rewrite
      # next-env.d.ts on the host every run.
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  frontend_next:
