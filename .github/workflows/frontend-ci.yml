name: Frontend CI

# Note: no workflow-level `paths:` filter. A path-filtered workflow that doesn't
# trigger reports no status at all, which would deadlock a required status check
# on PRs that don't touch frontend/. Filtering happens per-job below instead, and
# `frontend-ci-ok` always runs so it can safely be the required check.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect frontend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/frontend-ci.yml'

  lint-test-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    # Fall back to placeholders when the secrets are unavailable. Dependabot-
    # triggered runs (and runs from forks) do not receive repository secrets, so
    # without this `createClient()` in lib/supabase.ts throws "supabaseUrl is
    # required" and both the tests and the build fail on every dependency PR.
    #
    # Placeholders are safe here: NEXT_PUBLIC_* values are baked into the client
    # bundle and are public by definition, and this build only validates that the
    # app compiles. Vercel does the real build with the real values.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8000' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting with prettier
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  # Always runs, so it is safe to mark as a required status check in the branch
  # ruleset. Passes when lint-test-build succeeded or was skipped as irrelevant.
  frontend-ci-ok:
    needs: [lint-test-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report frontend CI result
        run: |
          result="${{ needs.lint-test-build.result }}"
          echo "lint-test-build: $result"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            exit 1
          fi
