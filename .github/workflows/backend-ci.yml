name: Backend CI

# Note: no workflow-level `paths:` filter. A path-filtered workflow that doesn't
# trigger reports no status at all, which would deadlock a required status check
# on PRs that don't touch backend/. Filtering happens per-job below instead, and
# `backend-ci-ok` always runs so it can safely be the required check.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Detect backend changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy app/

      - name: Run database migrations
        run: alembic upgrade head

      - name: Check for un-migrated model changes
        run: alembic check

      - name: Check for a single migration head
        run: |
          heads="$(alembic heads)"
          count="$(printf '%s\n' "$heads" | grep -c .)"
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly 1 migration head, found $count:"
            printf '%s\n' "$heads"
            exit 1
          fi

      - name: Verify migrations are reversible
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing

      - name: Build Docker image (validate only)
        run: docker build -t ultimate-tracker-backend:ci .

  # Always runs, so it is safe to mark as a required status check in the branch
  # ruleset. Passes when lint-and-test succeeded or was skipped as irrelevant.
  backend-ci-ok:
    needs: [lint-and-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report backend CI result
        run: |
          result="${{ needs.lint-and-test.result }}"
          echo "lint-and-test: $result"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            exit 1
          fi
