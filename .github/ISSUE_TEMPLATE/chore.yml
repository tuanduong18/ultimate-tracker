name: Chore / tech debt
description: Refactor, dependency work, infrastructure, CI, or docs.
title: "chore: "
labels: ["chore"]
body:
  - type: textarea
    id: task
    attributes:
      label: What needs doing?
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - Refactor
        - Dependencies
        - CI / CD
        - Infrastructure / deploy
        - Documentation
        - Test coverage
        - Observability
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why now?
      description: What does this unblock, or what breaks if it's left alone?
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Definition of done
      placeholder: |
        - [ ] ...
    validations:
      required: false
