version: 2

# `prefix: chore` keeps Dependabot PR titles passing pr-title.yml. Application
# ecosystems split majors into their own group so a breaking major can't block
# routine minor/patch updates.
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      frontend:
        patterns: ["*"]
        update-types: [minor, patch]
      frontend-major:
        patterns: ["*"]
        update-types: [major]

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      backend:
        patterns: ["*"]
        update-types: [minor, patch]
      backend-major:
        patterns: ["*"]
        update-types: [major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      # One group: action majors are low-risk and self-testing.
      actions:
        patterns: ["*"]
        update-types: [major, minor, patch]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      docker:
        patterns: ["*"]
        update-types: [major, minor, patch]
